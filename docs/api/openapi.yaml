          type: [string, "null"]
          format: uuid
        afterWorkItemId:
          type: [string, "null"]
          format: uuid
    BulkUpdateWorkItemsAction:
      oneOf:
        - type: object
          required: [type, assigneeId]
          properties:
            type:
              const: set_assignee
            assigneeId:
              type: string
              format: uuid
        - type: object
          required: [type]
          properties:
            type:
              const: clear_assignee
        - type: object
          required: [type, priority]
          properties:
            type:
              const: set_priority
            priority:
              $ref: "#/components/schemas/WorkItemPriority"
        - type: object
          required: [type, milestoneId]
          properties:
            type:
              const: set_milestone
            milestoneId:
              type: string
              format: uuid
        - type: object
          required: [type]
          properties:
            type:
              const: clear_milestone
        - type: object
          required: [type, cycleId]
          properties:
            type:
              const: set_cycle
            cycleId:
              type: string
              format: uuid
        - type: object
          required: [type]
          properties:
            type:
              const: clear_cycle
        - type: object
          required: [type, dueDate]
          properties:
            type:
              const: set_due_date
            dueDate:
              type: string
              format: date
        - type: object
          required: [type]
          properties:
            type:
              const: clear_due_date
        - type: object
          required: [type, labelIds]
          properties:
            type:
              const: add_labels
            labelIds:
              type: array
              minItems: 1
              maxItems: 20
              uniqueItems: true
              items:
                type: string
                format: uuid
        - type: object
          required: [type, labelIds]
          properties:
            type:
              const: remove_labels
            labelIds:
              type: array
              minItems: 1
              maxItems: 20
              uniqueItems: true
              items:
                type: string
                format: uuid
        - type: object
          required: [type, status]
          properties:
            type:
              const: transition_status
            status:
              $ref: "#/components/schemas/WorkItemStatus"
      discriminator:
        propertyName: type
    BulkUpdateWorkItemsRequest:
      type: object
      required: [workItemIds, action]
      properties:
        workItemIds:
          type: array
          minItems: 1
          maxItems: 50
          uniqueItems: true
          items:
            type: string
            format: uuid
        action:
          $ref: "#/components/schemas/BulkUpdateWorkItemsAction"
    BulkUpdateWorkItemsResultStatus:
      type: string
      enum: [updated, unchanged, failed]
    BulkUpdateWorkItemsErrorCode:
      type: string
      enum:
        - NOT_FOUND
        - NOT_IN_PROJECT
        - PROJECT_ARCHIVED
        - FORBIDDEN
        - INVALID_REFERENCE
        - WORKFLOW_TRANSITION_ERROR
        - VALIDATION_ERROR
    BulkUpdateWorkItemsError:
      type: object
      required: [code, message]
      properties:
        code:
          $ref: "#/components/schemas/BulkUpdateWorkItemsErrorCode"
        message:
          type: string
    BulkUpdateWorkItemsResult:
