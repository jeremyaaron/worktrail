        enum: [unread, all]
  responses:
    Error:
      description: Structured API error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      required: [status, service, checkedAt]
      properties:
        status:
          const: ok
        service:
          const: worktrail-api
        checkedAt:
          type: string
          format: date-time
    ReadinessResponse:
      type: object
      required: [status, service, checks, checkedAt]
      properties:
        status:
          const: ready
        service:
          const: worktrail-api
        checks:
          type: object
          required: [database]
          properties:
            database:
              const: ok
        checkedAt:
          type: string
          format: date-time
    ReadinessFailureResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, checks]
          properties:
            code:
              const: READINESS_FAILED
            message:
              type: string
            checks:
              type: object
              required: [database]
              properties:
                database:
                  const: failed
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              examples: [VALIDATION_ERROR, FORBIDDEN, NOT_FOUND, PAYLOAD_TOO_LARGE, ATTACHMENT_LIMIT_EXCEEDED, ATTACHMENT_STORAGE_UNAVAILABLE, EXPORT_LIMIT_EXCEEDED, INTERNAL_ERROR]
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    AttachmentCategory:
      type: string
      enum: [image, pdf, text, data, document]
    AttachmentTypePolicy:
      type: object
      required: [extensions, mediaTypes, canonicalMediaType, category]
      properties:
        extensions:
          type: array
          items:
            type: string
          examples: [[.png]]
        mediaTypes:
          type: array
          items:
            type: string
          examples: [[image/png]]
        canonicalMediaType:
          type: string
          example: image/png
        category:
          $ref: "#/components/schemas/AttachmentCategory"
    AttachmentPolicy:
      type: object
      required: [maxFileBytes, maxAttachmentsPerWorkItem, maxAggregateBytesPerWorkItem, maxFileNameCodePoints, acceptedTypes]
      properties:
        maxFileBytes:
          type: integer
          const: 4194304
          example: 4194304
        maxAttachmentsPerWorkItem:
          type: integer
          const: 20
          example: 20
        maxAggregateBytesPerWorkItem:
          type: integer
          const: 52428800
          example: 52428800
        maxFileNameCodePoints:
          type: integer
          const: 180
          example: 180
        acceptedTypes:
          type: array
          items:
            $ref: "#/components/schemas/AttachmentTypePolicy"
    WorkItemAttachmentUsage:
      type: object
      required: [attachmentCount, aggregateBytes, remainingAttachmentSlots, remainingBytes]
      properties:
        attachmentCount:
          type: integer
          minimum: 0
          maximum: 20
          example: 2
        aggregateBytes:
          type: integer
          minimum: 0
          maximum: 52428800
          example: 184
        remainingAttachmentSlots:
          type: integer
          minimum: 0
          maximum: 20
          example: 18
        remainingBytes:
          type: integer
          minimum: 0
          maximum: 52428800
          example: 52428616
    WorkItemAttachment:
      type: object
      required: [id, workItemId, fileName, mediaType, byteSize, uploader, createdAt, permissions]
      description: Public attachment metadata. File bytes are available only from the content endpoint.
      properties:
        id:
          type: string
          format: uuid
          example: 10000000-0000-4000-8000-000000001001
        workItemId:
          type: string
          format: uuid
          example: 10000000-0000-4000-8000-000000000403
        fileName:
          type: string
          minLength: 1
          description: Normalized display and download filename, limited to 180 Unicode code points.
          example: attachment-requirements.md
        mediaType:
          type: string
          example: text/markdown
        byteSize:
          type: integer
          minimum: 1
          maximum: 4194304
          example: 103
        uploader:
          $ref: "#/components/schemas/Member"
        createdAt:
          type: string
          format: date-time
          example: 2026-07-03T12:05:00.000Z
        permissions:
          type: object
          required: [canRemove]
          properties:
            canRemove:
              type: boolean
              example: true
    WorkItemAttachmentList:
      type: object
      required: [items, policy, usage, permissions]
      properties:
        items:
          type: array
          maxItems: 20
          items:
            $ref: "#/components/schemas/WorkItemAttachment"
        policy:
          $ref: "#/components/schemas/AttachmentPolicy"
        usage:
          $ref: "#/components/schemas/WorkItemAttachmentUsage"
        permissions:
          type: object
          required: [canUpload]
          properties:
            canUpload:
              type: boolean
              example: true
