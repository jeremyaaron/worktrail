        type: string
        enum: [updated_desc, updated_asc, priority_desc, priority_asc, due_date_asc, created_desc, board_order]
    WorkItemPageQuery:
      name: page
      in: query
      description: One-based requested page. Stale high pages normalize to the final current page.
      schema:
        type: integer
        minimum: 1
        default: 1
    WorkItemPageSizeQuery:
      name: pageSize
      in: query
      schema:
        type: integer
