    UpdateWorkItemRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        type:
          $ref: "#/components/schemas/WorkItemType"
        priority:
          $ref: "#/components/schemas/WorkItemPriority"
        assigneeId:
          type: [string, "null"]
          format: uuid
        labelIds:
          type: array
          items:
            type: string
            format: uuid
        milestoneId:
          type: [string, "null"]
          format: uuid
        cycleId:
          type: [string, "null"]
          format: uuid
        dueDate:
          type: [string, "null"]
          format: date
        estimatePoints:
          type: [number, "null"]
