      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
          nullable: true
          description: Project id for project-scoped saved views; null for workspace-scoped saved views.
        scope:
