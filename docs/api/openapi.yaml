    get:
      tags: [Work Items]
      summary: List eligible parent work items.
      description: Returns at most 20 same-project top-level parent candidates in deterministic relevance order. An item that already has children returns an empty list.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
        - name: search
          in: query
          schema:
            type: string
            maxLength: 120
      responses:
        "200":
          description: Eligible parent candidates.
          content:
            application/json:
              schema:
                type: array
                maxItems: 20
                items:
                  $ref: "#/components/schemas/WorkItemParentCandidate"
        "400":
          description: The work item ID or search value is malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: The work item does not exist in the actor workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/work-items/{workItemId}/parent:
    put:
      tags: [Work Items]
      summary: Set or clear a work item's parent.
      description: Sets, replaces, or clears the direct parent. Replaying the current parent is an idempotent no-op. Archived projects are read-only.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetWorkItemParentRequest"
      responses:
        "200":
          description: Updated work item detail, including idempotent no-op replays.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItemDetail"
        "400":
          description: Malformed request, self-parenting, or cross-project parent assignment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                selfParent:
                  value:
                    error:
                      code: VALIDATION_ERROR
                      message: A work item cannot be its own parent.
                projectMismatch:
                  value:
                    error:
                      code: VALIDATION_ERROR
                      message: Parent work must belong to the same project.
        "404":
          description: The current or proposed parent work item does not exist in the actor workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: NOT_FOUND
                  message: Parent work item not found.
        "409":
          description: The hierarchy would exceed two levels, the current item has children, or the project is archived.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                childAsParent:
                  value:
                    error:
                      code: CONFLICT
                      message: A child work item cannot contain child work.
                itemHasChildren:
                  value:
                    error:
                      code: CONFLICT
                      message: Work with children cannot be assigned a parent.
                archivedProject:
                  value:
                    error:
                      code: CONFLICT
                      message: Archived projects are read-only.
        default:
          $ref: "#/components/responses/Error"
  /api/work-items/{workItemId}/transitions:
