  /api/work-items/{workItemId}/attachments:
    get:
      tags: [Attachments]
      summary: List work item attachments.
      description: Returns bounded attachment metadata, current policy, exact usage, and upload capability. Active members can list attachments in active or archived projects. File bytes and internal storage metadata are never included.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      responses:
        "200":
          description: Attachment metadata and policy for the work item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItemAttachmentList"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    post:
      tags: [Attachments]
      summary: Upload one work item attachment.
      description: Uploads exactly one raw file. The request is limited to 4 MiB before endpoint execution. The project must be active. Supported filename extensions, declared media types, and file signatures are enforced by the returned attachment policy.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
        - name: X-Worktrail-Filename
          in: header
          required: true
          description: RFC 3986 percent-encoded UTF-8 display filename. It is decoded once, normalized, and limited to 180 Unicode code points.
          schema:
            type: string
          example: design%20review.png
        - name: X-Worktrail-Media-Type
          in: header
          required: true
          description: Declared media type matching the filename extension and supported type policy.
          schema:
            type: string
          example: image/png
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
              maxLength: 4194304
      responses:
        "201":
          description: Created attachment metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItemAttachment"
        "400":
          description: Missing or malformed metadata, an empty file, or a filename, media type, or file signature rejected by policy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          description: The owning project is archived.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Raw request body exceeds the 4 MiB per-file limit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: PAYLOAD_TOO_LARGE
                  message: The request body exceeds the 4 MiB limit.
                  details:
                    limitBytes: 4194304
        "422":
          description: The work item has reached its attachment count or aggregate byte limit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Attachment object storage could not complete the upload safely.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/attachments/{attachmentId}/content:
    get:
      tags: [Attachments]
      summary: Download an attachment.
      description: Returns the full integrity-verified file and always forces attachment disposition. Active members can download from active or archived projects. Range and HEAD requests are not supported.
      parameters:
        - $ref: "#/components/parameters/AttachmentId"
      responses:
        "200":
          description: Exact attachment bytes.
          headers:
            Content-Disposition:
              description: Safe ASCII fallback and RFC 5987 UTF-8 attachment filename.
              schema:
                type: string
            Content-Length:
              description: Authoritative attachment size in bytes.
              schema:
                type: integer
            Cache-Control:
              description: Always `private, no-store`.
              schema:
                type: string
                const: private, no-store
            X-Content-Type-Options:
              description: Always `nosniff`.
              schema:
                type: string
                const: nosniff
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          description: Stored bytes are missing, unavailable, oversized, or fail size/checksum verification.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/attachments/{attachmentId}:
    delete:
      tags: [Attachments]
      summary: Remove an attachment.
      description: Removes the object and live metadata while retaining safe activity context. The uploader or an owner/maintainer may remove from an active project. Missing stored objects are repaired by removing stale metadata.
      parameters:
        - $ref: "#/components/parameters/AttachmentId"
      responses:
        "204":
          description: Attachment removed with an empty response body.
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          description: The owning project is archived.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Attachment object storage could not complete removal safely.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/my-work:
    get:
      tags: [My Work]
      summary: Get the current actor's work dashboard.
      responses:
        "200":
          description: My Work dashboard.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyWorkDashboard"
        default:
          $ref: "#/components/responses/Error"
  /api/saved-work-views:
    get:
      tags: [Saved Work Views]
      summary: List saved work views for the current actor.
      description: Returns the current actor's personal saved views plus shared saved views. Workspace-scoped views are returned by default. Use `scope=project` with `projectId` to list views saved for one active or archived project.
      parameters:
        - $ref: "#/components/parameters/SavedViewScopeQuery"
        - $ref: "#/components/parameters/SavedViewProjectIdQuery"
      responses:
        "200":
          description: Saved work views.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedWorkView"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Saved Work Views]
      summary: Create a saved work view.
      description: Creates a personal workspace saved view by default. New saved views are created unpinned. Creating a shared saved view requires owner or maintainer role. Project-scoped saved views require `scope=project` and `projectId`, strip workspace-only query fields, and cannot be created for archived projects.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSavedWorkViewRequest"
      responses:
        "201":
          description: Created saved work view.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedWorkView"
        default:
          $ref: "#/components/responses/Error"
  /api/saved-work-views/{savedViewId}:
    patch:
      tags: [Saved Work Views]
      summary: Update a saved work view.
      description: Personal saved views can only be updated by their owner. Shared saved views require owner or maintainer role. The same update route handles rename, query updates, pin, and unpin. Archived project-scoped saved views cannot be mutated.
      parameters:
        - $ref: "#/components/parameters/SavedViewId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSavedWorkViewRequest"
      responses:
        "200":
          description: Updated saved work view.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedWorkView"
        default:
          $ref: "#/components/responses/Error"
    delete:
      tags: [Saved Work Views]
      summary: Delete a saved work view.
      description: Personal saved views can only be deleted by their owner. Shared saved views require owner or maintainer role. Archived project-scoped saved views cannot be mutated.
      parameters:
        - $ref: "#/components/parameters/SavedViewId"
      responses:
        "204":
          description: Saved work view deleted.
        default:
          $ref: "#/components/responses/Error"
