openapi: 3.1.0
info:
  title: Worktrail API
  version: 0.0.6
  summary: HTTP API reference for the Worktrail local-first project management app.
  description: |
    This document describes the implemented Worktrail API routes. It is intentionally
    representative rather than fully exhaustive; shared TypeScript contracts remain the
    source of truth for complete DTO details during early development.

    In local development, requests may include actor headers to simulate the signed-in
    workspace member. These headers are development-only and are not a production
    authentication design:

    - `x-worktrail-member-id`
    - `x-worktrail-workspace-id`
    - `x-worktrail-role`

    When actor headers are omitted in local development, the API falls back to the seed
    owner actor.
servers:
  - url: http://localhost:3000
    description: Local API or production preview server.
tags:
  - name: Health
  - name: Workspace
  - name: Members
  - name: Projects
  - name: Labels
  - name: Milestones
  - name: Work Items
  - name: Comments
  - name: Activity
  - name: My Work
  - name: Saved Work Views
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Compatibility liveness check.
      responses:
        "200":
          description: API process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/health/live:
    get:
      tags: [Health]
      summary: Liveness check.
      responses:
        "200":
          description: API process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/health/ready:
    get:
      tags: [Health]
      summary: Readiness check with database connectivity.
      responses:
        "200":
          description: API process can reach its database.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: API process is not ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessFailureResponse"
  /api/workspace:
    get:
      tags: [Workspace]
      summary: Get the current workspace.
      responses:
        "200":
          description: Current workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        default:
          $ref: "#/components/responses/Error"
    patch:
      tags: [Workspace]
      summary: Update the current workspace.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceRequest"
      responses:
        "200":
          description: Updated workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        default:
          $ref: "#/components/responses/Error"
  /api/workspace/capabilities:
    get:
      tags: [Workspace]
      summary: Get current actor capabilities.
      responses:
        "200":
          description: Actor permissions and workspace role labels.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceCapabilities"
        default:
          $ref: "#/components/responses/Error"
  /api/workspace/activity:
    get:
      tags: [Activity]
      summary: List workspace activity events.
      responses:
        "200":
          description: Workspace activity events.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceActivityEvent"
        default:
          $ref: "#/components/responses/Error"
  /api/members:
    get:
      tags: [Members]
      summary: List workspace members.
      responses:
        "200":
          description: Workspace members.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Members]
      summary: Create a workspace member.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemberRequest"
      responses:
        "201":
          description: Created member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        default:
          $ref: "#/components/responses/Error"
  /api/members/{memberId}:
    patch:
      tags: [Members]
      summary: Update a workspace member.
      parameters:
        - $ref: "#/components/parameters/MemberId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRequest"
      responses:
        "200":
          description: Updated member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        default:
          $ref: "#/components/responses/Error"
  /api/members/{memberId}/deactivate:
    post:
      tags: [Members]
      summary: Deactivate a workspace member.
      parameters:
        - $ref: "#/components/parameters/MemberId"
      responses:
        "200":
          description: Deactivated member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        default:
          $ref: "#/components/responses/Error"
  /api/members/{memberId}/reactivate:
    post:
      tags: [Members]
      summary: Reactivate a workspace member.
      parameters:
        - $ref: "#/components/parameters/MemberId"
      responses:
        "200":
          description: Reactivated member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        default:
          $ref: "#/components/responses/Error"
  /api/projects:
    get:
      tags: [Projects]
      summary: List projects.
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ProjectStatus"
      responses:
        "200":
          description: Projects.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Projects]
      summary: Create a project.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Created project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/navigation-summary:
    get:
      tags: [Projects]
      summary: List project navigation summaries.
      responses:
        "200":
          description: Navigation summaries for project switching.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectNavigationSummary"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}:
    get:
      tags: [Projects]
      summary: Get a project.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Error"
    patch:
      tags: [Projects]
      summary: Update a project.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Updated project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/summary:
    get:
      tags: [Projects]
      summary: Get project dashboard summary.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project counts and recent work.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSummary"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/planning-summary:
    get:
      tags: [Projects]
      summary: Get project planning and risk summary.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project planning summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectPlanningSummary"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/activity:
    get:
      tags: [Activity]
      summary: List project activity events.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project activity events.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/archive:
    post:
      tags: [Projects]
      summary: Archive a project.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Archived project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/reactivate:
    post:
      tags: [Projects]
      summary: Reactivate a project.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Reactivated project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/labels:
    get:
      tags: [Labels]
      summary: List project labels.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project labels.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Label"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Labels]
      summary: Create a project label.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLabelRequest"
      responses:
        "201":
          description: Created label.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Label"
        default:
          $ref: "#/components/responses/Error"
  /api/labels/{labelId}:
    patch:
      tags: [Labels]
      summary: Update a label.
      parameters:
        - $ref: "#/components/parameters/LabelId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLabelRequest"
      responses:
        "200":
          description: Updated label.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Label"
        default:
          $ref: "#/components/responses/Error"
  /api/labels/{labelId}/archive:
    post:
      tags: [Labels]
      summary: Archive a label.
      parameters:
        - $ref: "#/components/parameters/LabelId"
      responses:
        "200":
          description: Archived label.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Label"
        default:
          $ref: "#/components/responses/Error"
  /api/labels/{labelId}/reactivate:
    post:
      tags: [Labels]
      summary: Reactivate a label.
      parameters:
        - $ref: "#/components/parameters/LabelId"
      responses:
        "200":
          description: Reactivated label.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Label"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/milestones:
    get:
      tags: [Milestones]
      summary: List project milestones.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project milestones.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Milestone"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Milestones]
      summary: Create a project milestone.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMilestoneRequest"
      responses:
        "201":
          description: Created milestone.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
        default:
          $ref: "#/components/responses/Error"
  /api/milestones/{milestoneId}:
    patch:
      tags: [Milestones]
      summary: Update a milestone.
      parameters:
        - $ref: "#/components/parameters/MilestoneId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMilestoneRequest"
      responses:
        "200":
          description: Updated milestone.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
        default:
          $ref: "#/components/responses/Error"
  /api/milestones/{milestoneId}/archive:
    post:
      tags: [Milestones]
      summary: Archive a milestone.
      parameters:
        - $ref: "#/components/parameters/MilestoneId"
      responses:
        "200":
          description: Archived milestone.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
        default:
          $ref: "#/components/responses/Error"
  /api/milestones/{milestoneId}/reactivate:
    post:
      tags: [Milestones]
      summary: Reactivate a milestone.
      parameters:
        - $ref: "#/components/parameters/MilestoneId"
      responses:
        "200":
          description: Reactivated milestone.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
        default:
          $ref: "#/components/responses/Error"
  /api/work-items:
    get:
      tags: [Work Items]
      summary: List workspace work items.
      parameters:
        - $ref: "#/components/parameters/WorkItemStatusQuery"
        - $ref: "#/components/parameters/SearchQuery"
      responses:
        "200":
          description: Workspace work items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceWorkItemListItem"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/work-items:
    get:
      tags: [Work Items]
      summary: List work items for a project.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/WorkItemStatusQuery"
        - $ref: "#/components/parameters/SearchQuery"
      responses:
        "200":
          description: Project work items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkItemListItem"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Work Items]
      summary: Create a project work item.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkItemRequest"
      responses:
        "201":
          description: Created work item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItemDetail"
        default:
          $ref: "#/components/responses/Error"
  /api/work-items/{workItemId}:
    get:
      tags: [Work Items]
      summary: Get work item detail.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      responses:
        "200":
          description: Work item detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItemDetail"
        default:
          $ref: "#/components/responses/Error"
    patch:
      tags: [Work Items]
      summary: Update a work item.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkItemRequest"
      responses:
        "200":
          description: Updated work item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItemDetail"
        default:
          $ref: "#/components/responses/Error"
  /api/work-items/{workItemId}/transitions:
    post:
      tags: [Work Items]
      summary: Transition a work item to another status.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransitionWorkItemRequest"
      responses:
        "200":
          description: Transitioned work item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItemDetail"
        default:
          $ref: "#/components/responses/Error"
  /api/work-items/{workItemId}/board-move:
    post:
      tags: [Work Items]
      summary: Move a work item on the project board.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveWorkItemOnBoardRequest"
      responses:
        "200":
          description: Moved work item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItemDetail"
        default:
          $ref: "#/components/responses/Error"
  /api/work-items/{workItemId}/comments:
    get:
      tags: [Comments]
      summary: List work item comments.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      responses:
        "200":
          description: Comments.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Comments]
      summary: Create a work item comment.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
      responses:
        "201":
          description: Created comment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          $ref: "#/components/responses/Error"
  /api/comments/{commentId}:
    patch:
      tags: [Comments]
      summary: Update a comment.
      parameters:
        - $ref: "#/components/parameters/CommentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommentRequest"
      responses:
        "200":
          description: Updated comment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          $ref: "#/components/responses/Error"
    delete:
      tags: [Comments]
      summary: Delete a comment.
      parameters:
        - $ref: "#/components/parameters/CommentId"
      responses:
        "200":
          description: Deleted comment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          $ref: "#/components/responses/Error"
  /api/work-items/{workItemId}/activity:
    get:
      tags: [Activity]
      summary: List work item activity events.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      responses:
        "200":
          description: Work item activity events.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"
        default:
          $ref: "#/components/responses/Error"
  /api/my-work:
    get:
      tags: [My Work]
      summary: Get the current actor's work dashboard.
      responses:
        "200":
          description: My Work dashboard.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyWorkDashboard"
        default:
          $ref: "#/components/responses/Error"
  /api/saved-work-views:
    get:
      tags: [Saved Work Views]
      summary: List saved work views for the current actor.
      responses:
        "200":
          description: Saved work views.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedWorkView"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Saved Work Views]
      summary: Create a saved work view.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSavedWorkViewRequest"
      responses:
        "201":
          description: Created saved work view.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedWorkView"
        default:
          $ref: "#/components/responses/Error"
  /api/saved-work-views/{savedViewId}:
    patch:
      tags: [Saved Work Views]
      summary: Update a saved work view.
      parameters:
        - $ref: "#/components/parameters/SavedViewId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSavedWorkViewRequest"
      responses:
        "200":
          description: Updated saved work view.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedWorkView"
        default:
          $ref: "#/components/responses/Error"
    delete:
      tags: [Saved Work Views]
      summary: Delete a saved work view.
      parameters:
        - $ref: "#/components/parameters/SavedViewId"
      responses:
        "204":
          description: Saved work view deleted.
        default:
          $ref: "#/components/responses/Error"
components:
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkItemId:
      name: workItemId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LabelId:
      name: labelId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MilestoneId:
      name: milestoneId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CommentId:
      name: commentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SavedViewId:
      name: savedViewId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkItemStatusQuery:
      name: status
      in: query
      schema:
        $ref: "#/components/schemas/WorkItemStatus"
    SearchQuery:
      name: search
      in: query
      schema:
        type: string
  responses:
    Error:
      description: Structured API error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      required: [status, service, checkedAt]
      properties:
        status:
          const: ok
        service:
          const: worktrail-api
        checkedAt:
          type: string
          format: date-time
    ReadinessResponse:
      type: object
      required: [status, service, checks, checkedAt]
      properties:
        status:
          const: ready
        service:
          const: worktrail-api
        checks:
          type: object
          required: [database]
          properties:
            database:
              const: ok
        checkedAt:
          type: string
          format: date-time
    ReadinessFailureResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, checks]
          properties:
            code:
              const: READINESS_FAILED
            message:
              type: string
            checks:
              type: object
              required: [database]
              properties:
                database:
                  const: failed
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              examples: [VALIDATION_ERROR, FORBIDDEN, NOT_FOUND, INTERNAL_ERROR]
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    MemberRole:
      type: string
      enum: [owner, maintainer, contributor]
    ProjectStatus:
      type: string
      enum: [active, archived]
