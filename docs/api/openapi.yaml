openapi: 3.1.0
info:
  title: Worktrail API
  version: 0.1.1
  summary: HTTP API reference for the Worktrail local-first project management app.
  description: |
    This document describes the implemented Worktrail API routes. It is intentionally
    representative rather than fully exhaustive; shared TypeScript contracts remain the
    source of truth for complete DTO details during early development.

    In local development, requests may include actor headers to simulate the signed-in
    workspace member. These headers are development-only and are not a production
    authentication design:

    - `x-worktrail-member-id`
    - `x-worktrail-workspace-id`
    - `x-worktrail-role`

    When actor headers are omitted in local development, the API falls back to the seed
    owner actor.
servers:
  - url: http://localhost:3000
    description: Local API or production preview server.
tags:
  - name: Health
  - name: Workspace
  - name: Members
  - name: Projects
  - name: Labels
  - name: Milestones
  - name: Work Items
  - name: Relationships
  - name: Comments
  - name: Activity
  - name: My Work
  - name: Notifications
  - name: Saved Work Views
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Compatibility liveness check.
      responses:
        "200":
          description: API process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/health/live:
    get:
      tags: [Health]
      summary: Liveness check.
      responses:
        "200":
          description: API process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/health/ready:
    get:
      tags: [Health]
      summary: Readiness check with database connectivity.
      responses:
        "200":
          description: API process can reach its database.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: API process is not ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessFailureResponse"
  /api/workspace:
    get:
      tags: [Workspace]
      summary: Get the current workspace.
      responses:
        "200":
          description: Current workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        default:
          $ref: "#/components/responses/Error"
    patch:
      tags: [Workspace]
      summary: Update the current workspace.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceRequest"
      responses:
        "200":
          description: Updated workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        default:
          $ref: "#/components/responses/Error"
  /api/workspace/capabilities:
    get:
      tags: [Workspace]
      summary: Get current actor capabilities.
      responses:
        "200":
          description: Actor permissions and workspace role labels.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceCapabilities"
        default:
          $ref: "#/components/responses/Error"
  /api/workspace/activity:
    get:
      tags: [Activity]
      summary: List workspace activity events.
      responses:
        "200":
          description: Workspace activity events.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceActivityEvent"
        default:
          $ref: "#/components/responses/Error"
  /api/members:
    get:
      tags: [Members]
      summary: List workspace members.
      responses:
        "200":
          description: Workspace members.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Members]
      summary: Create a workspace member.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemberRequest"
      responses:
        "201":
          description: Created member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        default:
          $ref: "#/components/responses/Error"
  /api/members/{memberId}:
    patch:
      tags: [Members]
      summary: Update a workspace member.
      parameters:
        - $ref: "#/components/parameters/MemberId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRequest"
      responses:
        "200":
          description: Updated member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        default:
          $ref: "#/components/responses/Error"
  /api/members/{memberId}/deactivate:
    post:
      tags: [Members]
      summary: Deactivate a workspace member.
      parameters:
        - $ref: "#/components/parameters/MemberId"
      responses:
        "200":
          description: Deactivated member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        default:
          $ref: "#/components/responses/Error"
  /api/members/{memberId}/reactivate:
    post:
      tags: [Members]
      summary: Reactivate a workspace member.
      parameters:
        - $ref: "#/components/parameters/MemberId"
      responses:
        "200":
          description: Reactivated member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        default:
          $ref: "#/components/responses/Error"
  /api/notifications:
    get:
      tags: [Notifications]
      summary: List notifications for the current actor.
      parameters:
        - $ref: "#/components/parameters/NotificationStateQuery"
      responses:
        "200":
          description: Actor-scoped notification list with unread count.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/notifications/unread-count:
    get:
      tags: [Notifications]
      summary: Get unread notification count for the current actor.
      responses:
        "200":
          description: Unread notification count.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationUnreadCountResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/notifications/{notificationId}:
    patch:
      tags: [Notifications]
      summary: Update notification read state.
      parameters:
        - $ref: "#/components/parameters/NotificationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNotificationReadStateRequest"
      responses:
        "200":
          description: Updated notification.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
        default:
          $ref: "#/components/responses/Error"
  /api/notifications/mark-all-read:
    post:
      tags: [Notifications]
      summary: Mark all current actor notifications read.
      responses:
        "200":
          description: Remaining unread notification count.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationUnreadCountResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/projects:
    get:
      tags: [Projects]
      summary: List projects.
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ProjectStatus"
      responses:
        "200":
          description: Projects.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Projects]
      summary: Create a project.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Created project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/navigation-summary:
    get:
      tags: [Projects]
      summary: List project navigation summaries.
      responses:
        "200":
          description: Navigation summaries for project switching.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectNavigationSummary"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}:
    get:
      tags: [Projects]
      summary: Get a project.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Error"
    patch:
      tags: [Projects]
      summary: Update a project.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Updated project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/summary:
    get:
      tags: [Projects]
      summary: Get project dashboard summary.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project counts and recent work.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSummary"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/planning-summary:
    get:
      tags: [Projects]
      summary: Get project planning and risk summary.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project planning summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectPlanningSummary"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/activity:
    get:
      tags: [Activity]
      summary: List project activity events.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project activity events.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/archive:
    post:
      tags: [Projects]
      summary: Archive a project.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Archived project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/reactivate:
    post:
      tags: [Projects]
      summary: Reactivate a project.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Reactivated project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/labels:
    get:
      tags: [Labels]
      summary: List project labels.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project labels.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Label"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Labels]
      summary: Create a project label.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLabelRequest"
      responses:
        "201":
          description: Created label.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Label"
        default:
          $ref: "#/components/responses/Error"
  /api/labels/{labelId}:
    patch:
      tags: [Labels]
      summary: Update a label.
      parameters:
        - $ref: "#/components/parameters/LabelId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLabelRequest"
      responses:
        "200":
          description: Updated label.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Label"
        default:
          $ref: "#/components/responses/Error"
  /api/labels/{labelId}/archive:
    post:
      tags: [Labels]
      summary: Archive a label.
      parameters:
        - $ref: "#/components/parameters/LabelId"
      responses:
        "200":
          description: Archived label.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Label"
        default:
          $ref: "#/components/responses/Error"
  /api/labels/{labelId}/reactivate:
    post:
      tags: [Labels]
      summary: Reactivate a label.
      parameters:
        - $ref: "#/components/parameters/LabelId"
      responses:
        "200":
          description: Reactivated label.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Label"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/milestones:
    get:
      tags: [Milestones]
      summary: List project milestones.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project milestones.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Milestone"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Milestones]
      summary: Create a project milestone.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMilestoneRequest"
      responses:
        "201":
          description: Created milestone.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
        default:
          $ref: "#/components/responses/Error"
  /api/milestones/{milestoneId}:
    patch:
      tags: [Milestones]
      summary: Update a milestone.
      parameters:
        - $ref: "#/components/parameters/MilestoneId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMilestoneRequest"
      responses:
        "200":
          description: Updated milestone.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
        default:
          $ref: "#/components/responses/Error"
  /api/milestones/{milestoneId}/archive:
    post:
      tags: [Milestones]
      summary: Archive a milestone.
      parameters:
        - $ref: "#/components/parameters/MilestoneId"
      responses:
        "200":
          description: Archived milestone.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
        default:
          $ref: "#/components/responses/Error"
  /api/milestones/{milestoneId}/reactivate:
    post:
      tags: [Milestones]
      summary: Reactivate a milestone.
      parameters:
        - $ref: "#/components/parameters/MilestoneId"
      responses:
        "200":
          description: Reactivated milestone.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
        default:
          $ref: "#/components/responses/Error"
  /api/work-items:
    get:
      tags: [Work Items]
      summary: List workspace work items.
      parameters:
        - $ref: "#/components/parameters/WorkItemProjectIdQuery"
        - $ref: "#/components/parameters/WorkItemStatusQuery"
        - $ref: "#/components/parameters/WorkItemStateQuery"
        - $ref: "#/components/parameters/WorkItemAssigneeIdQuery"
        - $ref: "#/components/parameters/WorkItemAssigneeStateQuery"
        - $ref: "#/components/parameters/WorkItemReporterIdQuery"
        - $ref: "#/components/parameters/WorkItemTypeQuery"
        - $ref: "#/components/parameters/WorkItemPriorityQuery"
        - $ref: "#/components/parameters/WorkItemLabelIdQuery"
        - $ref: "#/components/parameters/WorkItemMilestoneIdQuery"
        - $ref: "#/components/parameters/WorkItemDueDateStateQuery"
        - $ref: "#/components/parameters/WorkItemBlockedQuery"
        - $ref: "#/components/parameters/WorkItemDependencyQuery"
        - $ref: "#/components/parameters/WorkItemArchivedProjectsQuery"
        - $ref: "#/components/parameters/SearchQuery"
        - $ref: "#/components/parameters/WorkItemSortQuery"
      responses:
        "200":
          description: Workspace work items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceWorkItemListItem"
        default:
          $ref: "#/components/responses/Error"
  /api/work-items/export:
    get:
      tags: [Work Items]
      summary: Export workspace work items as CSV.
      description: Exports the workspace discovery result set using the same applied query parameters as `GET /api/work-items`.
      parameters:
        - $ref: "#/components/parameters/WorkItemProjectIdQuery"
        - $ref: "#/components/parameters/WorkItemStatusQuery"
        - $ref: "#/components/parameters/WorkItemStateQuery"
        - $ref: "#/components/parameters/WorkItemAssigneeIdQuery"
        - $ref: "#/components/parameters/WorkItemAssigneeStateQuery"
        - $ref: "#/components/parameters/WorkItemReporterIdQuery"
        - $ref: "#/components/parameters/WorkItemTypeQuery"
        - $ref: "#/components/parameters/WorkItemPriorityQuery"
        - $ref: "#/components/parameters/WorkItemLabelIdQuery"
        - $ref: "#/components/parameters/WorkItemMilestoneIdQuery"
        - $ref: "#/components/parameters/WorkItemDueDateStateQuery"
        - $ref: "#/components/parameters/WorkItemBlockedQuery"
        - $ref: "#/components/parameters/WorkItemDependencyQuery"
        - $ref: "#/components/parameters/WorkItemArchivedProjectsQuery"
        - $ref: "#/components/parameters/SearchQuery"
        - $ref: "#/components/parameters/WorkItemSortQuery"
      responses:
        "200":
          description: CSV export for the filtered workspace work item result set.
          headers:
            Content-Disposition:
              schema:
                type: string
              description: Attachment filename, currently `worktrail-work-items.csv`.
          content:
            text/csv:
              schema:
                type: string
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/work-items:
    get:
      tags: [Work Items]
      summary: List work items for a project.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/WorkItemStatusQuery"
        - $ref: "#/components/parameters/WorkItemStateQuery"
        - $ref: "#/components/parameters/WorkItemAssigneeIdQuery"
        - $ref: "#/components/parameters/WorkItemAssigneeStateQuery"
        - $ref: "#/components/parameters/WorkItemReporterIdQuery"
        - $ref: "#/components/parameters/WorkItemTypeQuery"
        - $ref: "#/components/parameters/WorkItemPriorityQuery"
        - $ref: "#/components/parameters/WorkItemLabelIdQuery"
        - $ref: "#/components/parameters/WorkItemMilestoneIdQuery"
        - $ref: "#/components/parameters/WorkItemDueDateStateQuery"
        - $ref: "#/components/parameters/WorkItemBlockedQuery"
        - $ref: "#/components/parameters/WorkItemDependencyQuery"
        - $ref: "#/components/parameters/SearchQuery"
        - $ref: "#/components/parameters/WorkItemSortQuery"
      responses:
        "200":
          description: Project work items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkItemListItem"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Work Items]
      summary: Create a project work item.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkItemRequest"
      responses:
        "201":
          description: Created work item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItemDetail"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/work-items/imports/preview:
    post:
      tags: [Work Items]
      summary: Preview a project work item CSV import.
      description: Validates CSV content and returns normalized rows without creating work items.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkItemCsvImportPreviewRequest"
      responses:
        "200":
          description: Import validation preview.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItemCsvImportPreview"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/work-items/imports:
    post:
      tags: [Work Items]
      summary: Apply a project work item CSV import.
      description: Revalidates CSV content and creates all valid rows transactionally. Validation failures prevent all writes.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkItemCsvImportApplyRequest"
      responses:
        "201":
          description: Import result with created work items.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItemCsvImportApply"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/work-items/export:
    get:
      tags: [Work Items]
      summary: Export project work items as CSV.
      description: Exports the project work item list using the same applied query parameters as `GET /api/projects/{projectId}/work-items`.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/WorkItemStatusQuery"
        - $ref: "#/components/parameters/WorkItemStateQuery"
        - $ref: "#/components/parameters/WorkItemAssigneeIdQuery"
        - $ref: "#/components/parameters/WorkItemAssigneeStateQuery"
        - $ref: "#/components/parameters/WorkItemReporterIdQuery"
        - $ref: "#/components/parameters/WorkItemTypeQuery"
        - $ref: "#/components/parameters/WorkItemPriorityQuery"
        - $ref: "#/components/parameters/WorkItemLabelIdQuery"
        - $ref: "#/components/parameters/WorkItemMilestoneIdQuery"
        - $ref: "#/components/parameters/WorkItemDueDateStateQuery"
        - $ref: "#/components/parameters/WorkItemBlockedQuery"
        - $ref: "#/components/parameters/WorkItemDependencyQuery"
        - $ref: "#/components/parameters/SearchQuery"
        - $ref: "#/components/parameters/WorkItemSortQuery"
      responses:
        "200":
          description: CSV export for the filtered project work item result set.
          headers:
            Content-Disposition:
              schema:
                type: string
              description: Attachment filename, currently `worktrail-{projectKey}-work-items.csv`.
          content:
            text/csv:
              schema:
                type: string
        default:
          $ref: "#/components/responses/Error"
  /api/work-items/{workItemId}:
    get:
      tags: [Work Items]
      summary: Get work item detail.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      responses:
        "200":
          description: Work item detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItemDetail"
        default:
          $ref: "#/components/responses/Error"
    patch:
      tags: [Work Items]
      summary: Update a work item.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkItemRequest"
      responses:
        "200":
          description: Updated work item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItemDetail"
        default:
          $ref: "#/components/responses/Error"
  /api/work-items/{workItemId}/transitions:
    post:
      tags: [Work Items]
      summary: Transition a work item to another status.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransitionWorkItemRequest"
      responses:
        "200":
          description: Transitioned work item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItemDetail"
        default:
          $ref: "#/components/responses/Error"
  /api/work-items/{workItemId}/board-move:
    post:
      tags: [Work Items]
      summary: Move a work item on the project board.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveWorkItemOnBoardRequest"
      responses:
        "200":
          description: Moved work item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItemDetail"
        default:
          $ref: "#/components/responses/Error"
  /api/work-items/{workItemId}/watchers:
    get:
      tags: [Work Items]
      summary: Get watch state for a work item.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      responses:
        "200":
          description: Current actor watch state and active watcher list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItemWatchState"
        default:
          $ref: "#/components/responses/Error"
  /api/work-items/{workItemId}/watch:
    put:
      tags: [Work Items]
      summary: Watch a work item as the current actor.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      responses:
        "200":
          description: Updated watch state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItemWatchState"
        default:
          $ref: "#/components/responses/Error"
    delete:
      tags: [Work Items]
      summary: Stop watching a work item as the current actor.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      responses:
        "200":
          description: Updated watch state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItemWatchState"
        default:
          $ref: "#/components/responses/Error"
  /api/work-items/{workItemId}/comments:
    get:
      tags: [Comments]
      summary: List work item comments.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      responses:
        "200":
          description: Comments.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Comments]
      summary: Create a work item comment.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
      responses:
        "201":
          description: Created comment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          $ref: "#/components/responses/Error"
  /api/comments/{commentId}:
    patch:
      tags: [Comments]
      summary: Update a comment.
      parameters:
        - $ref: "#/components/parameters/CommentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommentRequest"
      responses:
        "200":
          description: Updated comment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          $ref: "#/components/responses/Error"
    delete:
      tags: [Comments]
      summary: Delete a comment.
      parameters:
        - $ref: "#/components/parameters/CommentId"
      responses:
        "200":
          description: Deleted comment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        default:
          $ref: "#/components/responses/Error"
  /api/work-items/{workItemId}/activity:
    get:
      tags: [Activity]
      summary: List work item activity events.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      responses:
        "200":
          description: Work item activity events.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"
        default:
          $ref: "#/components/responses/Error"
  /api/work-items/{workItemId}/relationships:
    get:
      tags: [Relationships]
      summary: List relationships for a work item.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      responses:
        "200":
          description: Relationship summary for the work item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItemRelationshipSummary"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Relationships]
      summary: Create a work item relationship.
      description: Creates a `blocks` or `relates_to` relationship. The API rejects cross-workspace targets, duplicate relationships, self-links, and blocking cycles.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkItemRelationshipRequest"
      responses:
        "201":
          description: Created relationship.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItemRelationship"
        default:
          $ref: "#/components/responses/Error"
  /api/work-items/{workItemId}/relationships/{relationshipId}:
    delete:
      tags: [Relationships]
      summary: Delete a work item relationship.
      parameters:
        - $ref: "#/components/parameters/WorkItemId"
        - $ref: "#/components/parameters/WorkItemRelationshipId"
      responses:
        "204":
          description: Relationship deleted.
        default:
          $ref: "#/components/responses/Error"
  /api/my-work:
    get:
      tags: [My Work]
      summary: Get the current actor's work dashboard.
      responses:
        "200":
          description: My Work dashboard.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyWorkDashboard"
        default:
          $ref: "#/components/responses/Error"
  /api/saved-work-views:
    get:
      tags: [Saved Work Views]
      summary: List saved work views for the current actor.
      responses:
        "200":
          description: Saved work views.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedWorkView"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Saved Work Views]
      summary: Create a saved work view.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSavedWorkViewRequest"
      responses:
        "201":
          description: Created saved work view.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedWorkView"
        default:
          $ref: "#/components/responses/Error"
  /api/saved-work-views/{savedViewId}:
    patch:
      tags: [Saved Work Views]
      summary: Update a saved work view.
      parameters:
        - $ref: "#/components/parameters/SavedViewId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSavedWorkViewRequest"
      responses:
        "200":
          description: Updated saved work view.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedWorkView"
        default:
          $ref: "#/components/responses/Error"
    delete:
      tags: [Saved Work Views]
      summary: Delete a saved work view.
      parameters:
        - $ref: "#/components/parameters/SavedViewId"
      responses:
        "204":
          description: Saved work view deleted.
        default:
          $ref: "#/components/responses/Error"
components:
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkItemId:
      name: workItemId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkItemRelationshipId:
      name: relationshipId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LabelId:
      name: labelId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MilestoneId:
      name: milestoneId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CommentId:
      name: commentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    NotificationId:
      name: notificationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SavedViewId:
      name: savedViewId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkItemStatusQuery:
      name: status
      in: query
      schema:
        $ref: "#/components/schemas/WorkItemStatus"
    WorkItemProjectIdQuery:
      name: projectId
      in: query
      schema:
        type: string
        format: uuid
    WorkItemStateQuery:
      name: workState
      in: query
      schema:
        type: string
        enum: [open, terminal]
    WorkItemAssigneeIdQuery:
      name: assigneeId
      in: query
      schema:
        type: string
        format: uuid
    WorkItemAssigneeStateQuery:
      name: assigneeState
      in: query
      schema:
        type: string
        enum: [assigned, unassigned]
    WorkItemReporterIdQuery:
      name: reporterId
      in: query
      schema:
        type: string
        format: uuid
    WorkItemTypeQuery:
      name: type
      in: query
      schema:
        $ref: "#/components/schemas/WorkItemType"
    WorkItemPriorityQuery:
      name: priority
      in: query
      schema:
        $ref: "#/components/schemas/WorkItemPriority"
    WorkItemLabelIdQuery:
      name: labelId
      in: query
      schema:
        type: string
        format: uuid
    WorkItemMilestoneIdQuery:
      name: milestoneId
      in: query
      schema:
        type: string
        format: uuid
    WorkItemDueDateStateQuery:
      name: dueDateState
      in: query
      schema:
        type: string
        enum: [overdue, due_soon, none]
    WorkItemBlockedQuery:
      name: blocked
      in: query
      schema:
        type: boolean
    WorkItemDependencyQuery:
      name: dependency
      in: query
      description: Derived dependency state for open blocking relationships.
      schema:
        $ref: "#/components/schemas/DependencyFilter"
    WorkItemArchivedProjectsQuery:
      name: archivedProjects
      in: query
      schema:
        type: string
        enum: [exclude, include, only]
    SearchQuery:
      name: search
      in: query
      schema:
        type: string
        maxLength: 120
    WorkItemSortQuery:
      name: sort
      in: query
      schema:
        type: string
        enum: [updated_desc, updated_asc, priority_desc, priority_asc, due_date_asc, created_desc, board_order]
    NotificationStateQuery:
      name: state
      in: query
      schema:
        type: string
        enum: [unread, all]
  responses:
    Error:
      description: Structured API error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      required: [status, service, checkedAt]
      properties:
        status:
          const: ok
        service:
          const: worktrail-api
        checkedAt:
          type: string
          format: date-time
    ReadinessResponse:
      type: object
      required: [status, service, checks, checkedAt]
      properties:
        status:
          const: ready
        service:
          const: worktrail-api
        checks:
          type: object
          required: [database]
          properties:
            database:
              const: ok
        checkedAt:
          type: string
          format: date-time
    ReadinessFailureResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, checks]
          properties:
            code:
              const: READINESS_FAILED
            message:
              type: string
            checks:
              type: object
              required: [database]
              properties:
                database:
                  const: failed
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              examples: [VALIDATION_ERROR, FORBIDDEN, NOT_FOUND, INTERNAL_ERROR]
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    MemberRole:
      type: string
      enum: [owner, maintainer, contributor]
    ProjectStatus:
      type: string
      enum: [active, archived]
    WorkItemType:
      type: string
      enum: [task, bug, story, chore]
    WorkItemStatus:
      type: string
      enum: [backlog, ready, in_progress, blocked, done, canceled]
    WorkItemPriority:
      type: string
      enum: [low, medium, high, urgent]
    MilestoneStatus:
      type: string
      enum: [planned, active, completed, canceled]
    WorkItemRelationshipType:
      type: string
      enum: [blocks, relates_to]
    DependencyFilter:
      type: string
      enum: [dependency_blocked, blocking_open_work]
    DeliveryHealthState:
      type: string
      enum: [healthy, at_risk, blocked, complete, inactive]
      description: Derived delivery-health state. The frontend labels `healthy` as "On track".
    DeliveryHealthSeverity:
      type: string
      enum: [info, warning, critical]
    DeliveryHealthReasonKey:
      type: string
      enum:
        - all_work_done
        - blocked_work
        - blocking_open_work
        - completed_with_open_work
        - dependency_blocked
        - due_soon
        - empty_active_milestone
        - inactive_milestone
        - open_work
        - overdue_work
        - stale_in_progress
        - target_date_past
        - unassigned_active
        - unmilestoned_risk
    PlanningReviewItemKind:
      type: string
      enum: [work_item, milestone, activity]
    WorkItemQuery:
      type: object
      additionalProperties: false
      properties:
        projectId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/WorkItemStatus"
        workState:
          type: string
          enum: [open, terminal]
        assigneeId:
          type: string
          format: uuid
        assigneeState:
          type: string
          enum: [assigned, unassigned]
        reporterId:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/WorkItemType"
        priority:
          $ref: "#/components/schemas/WorkItemPriority"
        labelId:
          type: string
          format: uuid
        milestoneId:
          type: string
          format: uuid
        dueDateState:
          type: string
          enum: [overdue, due_soon, none]
        blocked:
          type: boolean
        dependency:
          $ref: "#/components/schemas/DependencyFilter"
        archivedProjects:
          type: string
          enum: [exclude, include, only]
        search:
          type: string
          maxLength: 120
        sort:
          type: string
          enum: [updated_desc, updated_asc, priority_desc, priority_asc, due_date_asc, created_desc, board_order]
    Member:
      type: object
      required: [id, workspaceId, name, email, role, isActive, deactivatedAt, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/MemberRole"
        isActive:
          type: boolean
        deactivatedAt:
          type: [string, "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateMemberRequest:
      type: object
      required: [name, email, role]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/MemberRole"
    UpdateMemberRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/MemberRole"
    Workspace:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UpdateWorkspaceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
    WorkspaceCapabilities:
      type: object
      required: [actor, canManageWorkspace, canManageMembers, canCreateProjects, canManageProjects]
      properties:
        actor:
          $ref: "#/components/schemas/Member"
        canManageWorkspace:
          type: boolean
        canManageMembers:
          type: boolean
        canCreateProjects:
          type: boolean
        canManageProjects:
          type: boolean
        canManageMilestones:
          type: boolean
        canManageLabels:
          type: boolean
        canCreateWorkItems:
          type: boolean
        roleSummary:
          type: object
          additionalProperties:
            type: string
    WorkspaceActivityEvent:
      type: object
      required: [id, workspaceId, actor, eventType, summary, createdAt]
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        actor:
          $ref: "#/components/schemas/Member"
        eventType:
          type: string
          examples: [work_item.relationship_added, work_item.relationship_removed]
        summary:
          type: string
        previousValue:
          type: [object, "null"]
          additionalProperties: true
        newValue:
          type: [object, "null"]
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
    Project:
      type: object
      required: [id, workspaceId, key, name, description, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        key:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/ProjectStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        key:
          type: string
        name:
          type: string
        description:
          type: string
    UpdateProjectRequest:
      type: object
      properties:
        key:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/ProjectStatus"
    ProjectNavigationSummary:
      type: object
      required: [project, openWorkItemCount, blockedWorkItemCount, overdueWorkItemCount, updatedAt]
      properties:
        project:
          $ref: "#/components/schemas/Project"
        openWorkItemCount:
          type: integer
        blockedWorkItemCount:
          type: integer
        overdueWorkItemCount:
          type: integer
        updatedAt:
          type: string
          format: date-time
    ProjectSummary:
      type: object
      required: [project, countsByStatus, recentWorkItems, deliveryHealth]
      properties:
        project:
          $ref: "#/components/schemas/Project"
        countsByStatus:
          type: array
          items:
            type: object
            properties:
              status:
                $ref: "#/components/schemas/WorkItemStatus"
              count:
                type: integer
        recentWorkItems:
          type: array
          items:
            $ref: "#/components/schemas/RecentWorkItem"
        deliveryHealth:
          $ref: "#/components/schemas/ProjectDeliveryHealth"
    RecentWorkItem:
      type: object
      required: [id, displayKey, title, status, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        displayKey:
          type: string
        title:
          type: string
        status:
          $ref: "#/components/schemas/WorkItemStatus"
        updatedAt:
          type: string
          format: date-time
    ProjectPlanningSummary:
      type: object
      required:
        - project
        - deliveryHealth
        - milestoneProgress
        - planningReview
        - blockedWork
        - overdueWork
        - dueSoonWork
        - unassignedActiveWork
        - staleInProgressWork
        - dependencyBlockedWork
        - blockingOpenWork
      properties:
        project:
          $ref: "#/components/schemas/Project"
        deliveryHealth:
          $ref: "#/components/schemas/ProjectDeliveryHealth"
        milestoneProgress:
          type: array
          items:
            $ref: "#/components/schemas/MilestoneProgress"
        planningReview:
          $ref: "#/components/schemas/PlanningReview"
        blockedWork:
          type: array
          items:
            $ref: "#/components/schemas/PlanningRiskItem"
        overdueWork:
          type: array
          items:
            $ref: "#/components/schemas/PlanningRiskItem"
        dueSoonWork:
          type: array
          items:
            $ref: "#/components/schemas/PlanningRiskItem"
        unassignedActiveWork:
          type: array
          items:
            $ref: "#/components/schemas/PlanningRiskItem"
        staleInProgressWork:
          type: array
          items:
            $ref: "#/components/schemas/PlanningRiskItem"
        dependencyBlockedWork:
          type: array
          items:
            $ref: "#/components/schemas/PlanningRiskItem"
        blockingOpenWork:
          type: array
          items:
            $ref: "#/components/schemas/PlanningRiskItem"
    DeliveryHealthReason:
      type: object
      required: [key, severity, message, count, query]
      properties:
        key:
          $ref: "#/components/schemas/DeliveryHealthReasonKey"
        severity:
          $ref: "#/components/schemas/DeliveryHealthSeverity"
        message:
          type: string
          examples: [1 blocked work item, 2 due-soon work items]
        count:
          type: integer
          minimum: 0
        query:
          anyOf:
            - $ref: "#/components/schemas/WorkItemQuery"
            - type: "null"
          description: Work item filter query when the reason can be represented by the current query contract.
    ProjectDeliveryHealth:
      type: object
      required:
        - health
        - activeMilestoneCount
        - healthyMilestoneCount
        - atRiskMilestoneCount
        - blockedMilestoneCount
        - completeMilestoneCount
        - inactiveMilestoneCount
        - openWorkCount
        - blockedWorkCount
        - dependencyBlockedWorkCount
        - blockingOpenWorkCount
        - overdueWorkCount
        - dueSoonWorkCount
        - unassignedActiveWorkCount
        - staleInProgressWorkCount
        - unmilestonedActiveRiskCount
        - reasons
      properties:
        health:
          $ref: "#/components/schemas/DeliveryHealthState"
        activeMilestoneCount:
          type: integer
          minimum: 0
        healthyMilestoneCount:
          type: integer
          minimum: 0
        atRiskMilestoneCount:
          type: integer
          minimum: 0
        blockedMilestoneCount:
          type: integer
          minimum: 0
        completeMilestoneCount:
          type: integer
          minimum: 0
        inactiveMilestoneCount:
          type: integer
          minimum: 0
        openWorkCount:
          type: integer
          minimum: 0
        blockedWorkCount:
          type: integer
          minimum: 0
        dependencyBlockedWorkCount:
          type: integer
          minimum: 0
        blockingOpenWorkCount:
          type: integer
          minimum: 0
        overdueWorkCount:
          type: integer
          minimum: 0
        dueSoonWorkCount:
          type: integer
          minimum: 0
        unassignedActiveWorkCount:
          type: integer
          minimum: 0
        staleInProgressWorkCount:
          type: integer
          minimum: 0
        unmilestonedActiveRiskCount:
          type: integer
          minimum: 0
        reasons:
          type: array
          items:
            $ref: "#/components/schemas/DeliveryHealthReason"
    MilestoneProgress:
      type: object
      required:
        - milestone
        - totalCount
        - doneCount
        - openCount
        - blockedCount
        - dependencyBlockedCount
        - overdueCount
        - dueSoonCount
        - unassignedActiveCount
        - staleInProgressCount
        - health
        - reasons
      properties:
        milestone:
          $ref: "#/components/schemas/Milestone"
        totalCount:
          type: integer
          minimum: 0
        doneCount:
          type: integer
          minimum: 0
        openCount:
          type: integer
          minimum: 0
        blockedCount:
          type: integer
          minimum: 0
        dependencyBlockedCount:
          type: integer
          minimum: 0
        overdueCount:
          type: integer
          minimum: 0
        dueSoonCount:
          type: integer
          minimum: 0
        unassignedActiveCount:
          type: integer
          minimum: 0
        staleInProgressCount:
          type: integer
          minimum: 0
        health:
          $ref: "#/components/schemas/DeliveryHealthState"
        reasons:
          type: array
          items:
            $ref: "#/components/schemas/DeliveryHealthReason"
    PlanningReview:
      type: object
      required: [needsAttention, upcoming, recentlyChanged]
      properties:
        needsAttention:
          type: array
          items:
            $ref: "#/components/schemas/PlanningReviewItem"
        upcoming:
