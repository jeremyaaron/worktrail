openapi: 3.1.0
info:
  title: Worktrail API
  version: 0.2.7
  summary: HTTP API reference for the Worktrail local-first project management app.
  description: |
    This document describes the implemented Worktrail API routes. It is intentionally
    representative rather than fully exhaustive; shared TypeScript contracts remain the
    source of truth for complete DTO details during early development.

    In local development, requests may include actor headers to simulate the signed-in
    workspace member. These headers are development-only and are not a production
    authentication design:

    - `x-worktrail-member-id`
    - `x-worktrail-workspace-id`
    - `x-worktrail-role`

    When actor headers are omitted in local development, the API falls back to the seed
    owner actor.
servers:
  - url: http://localhost:3000
    description: Local API or production preview server.
tags:
  - name: Health
  - name: Workspace
  - name: Members
  - name: Projects
  - name: Labels
  - name: Milestones
  - name: Cycles
  - name: Work Items
  - name: Attachments
  - name: Relationships
  - name: Comments
  - name: Activity
  - name: Status Reports
  - name: My Work
  - name: Notifications
  - name: Saved Work Views
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Compatibility liveness check.
      responses:
        "200":
          description: API process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/health/live:
    get:
      tags: [Health]
      summary: Liveness check.
      responses:
        "200":
          description: API process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/health/ready:
    get:
      tags: [Health]
      summary: Readiness check with database connectivity.
      responses:
        "200":
          description: API process can reach its database.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: API process is not ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessFailureResponse"
  /api/workspace:
    get:
      tags: [Workspace]
      summary: Get the current workspace.
      responses:
        "200":
          description: Current workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        default:
          $ref: "#/components/responses/Error"
    patch:
      tags: [Workspace]
      summary: Update the current workspace.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceRequest"
      responses:
        "200":
          description: Updated workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        default:
          $ref: "#/components/responses/Error"
  /api/workspace/capabilities:
    get:
      tags: [Workspace]
      summary: Get current actor capabilities.
      responses:
        "200":
          description: Actor permissions and workspace role labels.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceCapabilities"
        default:
          $ref: "#/components/responses/Error"
  /api/workspace/activity:
    get:
      tags: [Activity]
      summary: List workspace activity events.
      responses:
        "200":
          description: Workspace activity events.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceActivityEvent"
        default:
          $ref: "#/components/responses/Error"
  /api/members:
    get:
      tags: [Members]
      summary: List workspace members.
      responses:
        "200":
          description: Workspace members.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Members]
      summary: Create a workspace member.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemberRequest"
      responses:
        "201":
          description: Created member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        default:
          $ref: "#/components/responses/Error"
  /api/members/{memberId}:
    patch:
      tags: [Members]
      summary: Update a workspace member.
      parameters:
        - $ref: "#/components/parameters/MemberId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRequest"
      responses:
        "200":
          description: Updated member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        default:
          $ref: "#/components/responses/Error"
  /api/members/{memberId}/deactivate:
    post:
      tags: [Members]
      summary: Deactivate a workspace member.
      parameters:
        - $ref: "#/components/parameters/MemberId"
      responses:
        "200":
          description: Deactivated member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        default:
          $ref: "#/components/responses/Error"
  /api/members/{memberId}/reactivate:
    post:
      tags: [Members]
      summary: Reactivate a workspace member.
      parameters:
        - $ref: "#/components/parameters/MemberId"
      responses:
        "200":
          description: Reactivated member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        default:
          $ref: "#/components/responses/Error"
  /api/notifications:
    get:
      tags: [Notifications]
      summary: List notifications for the current actor.
      parameters:
        - $ref: "#/components/parameters/NotificationStateQuery"
      responses:
        "200":
          description: Actor-scoped notification list with unread count.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/notifications/unread-count:
    get:
      tags: [Notifications]
      summary: Get unread notification count for the current actor.
      responses:
        "200":
          description: Unread notification count.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationUnreadCountResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/notifications/{notificationId}:
    patch:
      tags: [Notifications]
      summary: Update notification read state.
      parameters:
        - $ref: "#/components/parameters/NotificationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNotificationReadStateRequest"
      responses:
        "200":
          description: Updated notification.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
        default:
          $ref: "#/components/responses/Error"
  /api/notifications/mark-all-read:
    post:
      tags: [Notifications]
      summary: Mark all current actor notifications read.
      responses:
        "200":
          description: Remaining unread notification count.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationUnreadCountResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/portfolio:
    get:
      tags: [Projects]
      summary: Get workspace portfolio review.
      description: Returns a read-only, derived portfolio review for active projects in the current actor workspace.
      responses:
        "200":
          description: Workspace portfolio review.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Portfolio"
        default:
          $ref: "#/components/responses/Error"
  /api/projects:
    get:
      tags: [Projects]
      summary: List projects.
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ProjectStatus"
      responses:
        "200":
          description: Projects.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Projects]
      summary: Create a project.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Created project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/navigation-summary:
    get:
      tags: [Projects]
      summary: List project navigation summaries.
      responses:
        "200":
          description: Navigation summaries for project switching.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectNavigationSummary"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}:
    get:
      tags: [Projects]
      summary: Get a project.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Error"
    patch:
      tags: [Projects]
      summary: Update a project.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Updated project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/summary:
    get:
      tags: [Projects]
      summary: Get project dashboard summary.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project counts and recent work.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSummary"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/planning-summary:
    get:
      tags: [Projects]
      summary: Get project planning and risk summary.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project planning summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectPlanningSummary"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/status-reports:
    get:
      tags: [Status Reports]
      summary: List project status reports.
      description: Lists immutable, published project status reports newest first. Contributors may read reports, including reports for archived projects.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Published project status report summaries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectStatusReportSummary"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Status Reports]
      summary: Publish a project status report.
      description: Publishes an immutable status report. Owners and maintainers can publish for active projects. When `snapshot` is omitted, the API regenerates a current snapshot at publish time.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectStatusReportRequest"
      responses:
        "201":
          description: Published project status report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectStatusReportDetail"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          description: Project is archived or snapshot validation conflicts with the project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/status-reports/draft:
    get:
      tags: [Status Reports]
      summary: Generate a project status report draft.
      description: Generates an editable report draft from current project state. Owners and maintainers can draft reports for active projects.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Generated project status report draft.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectStatusReportDraft"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          description: Project is archived and cannot produce a new draft.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/status-reports/{reportId}:
    get:
      tags: [Status Reports]
      summary: Get a project status report.
      description: Returns an immutable published status report and its captured snapshot. Contributors may read reports, including reports for archived projects.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/StatusReportId"
      responses:
        "200":
          description: Published project status report detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectStatusReportDetail"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/status-reports/{reportId}/export.md:
    get:
      tags: [Status Reports]
      summary: Export a project status report as Markdown.
      description: Exports an immutable published status report and its captured snapshot as Markdown. Contributors may export reports, including reports for archived projects. Links in the Markdown open current Worktrail data.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/StatusReportId"
      responses:
        "200":
          description: Markdown export for the published project status report.
          headers:
            Content-Disposition:
              schema:
                type: string
              description: Attachment filename, currently `worktrail-{projectKey}-{statusDate}-{reportTitle}.md`.
          content:
            text/markdown:
              schema:
                type: string
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/milestones/{milestoneId}/review:
    get:
      tags: [Milestones]
      summary: Get milestone review.
      description: Derived, read-only milestone review with progress, health, scoped risk sections, recent movement, and project Work query links. The response is computed at read time and does not create a persisted snapshot.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/MilestoneId"
      responses:
        "200":
          description: Milestone review.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MilestoneReview"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/activity:
    get:
      tags: [Activity]
      summary: List project activity events.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project activity events.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/archive:
    post:
      tags: [Projects]
      summary: Archive a project.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Archived project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/reactivate:
    post:
      tags: [Projects]
      summary: Reactivate a project.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Reactivated project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/labels:
    get:
      tags: [Labels]
      summary: List project labels.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project labels.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Label"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Labels]
      summary: Create a project label.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLabelRequest"
      responses:
        "201":
          description: Created label.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Label"
        default:
          $ref: "#/components/responses/Error"
  /api/labels/{labelId}:
    patch:
      tags: [Labels]
      summary: Update a label.
      parameters:
        - $ref: "#/components/parameters/LabelId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLabelRequest"
      responses:
        "200":
          description: Updated label.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Label"
        default:
          $ref: "#/components/responses/Error"
  /api/labels/{labelId}/archive:
    post:
      tags: [Labels]
      summary: Archive a label.
      parameters:
        - $ref: "#/components/parameters/LabelId"
      responses:
        "200":
          description: Archived label.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Label"
        default:
          $ref: "#/components/responses/Error"
  /api/labels/{labelId}/reactivate:
    post:
      tags: [Labels]
      summary: Reactivate a label.
      parameters:
        - $ref: "#/components/parameters/LabelId"
      responses:
        "200":
          description: Reactivated label.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Label"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/milestones:
    get:
      tags: [Milestones]
      summary: List project milestones.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project milestones.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Milestone"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Milestones]
      summary: Create a project milestone.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMilestoneRequest"
      responses:
        "201":
          description: Created milestone.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
        default:
          $ref: "#/components/responses/Error"
  /api/milestones/{milestoneId}:
    patch:
      tags: [Milestones]
      summary: Update a milestone.
      parameters:
        - $ref: "#/components/parameters/MilestoneId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMilestoneRequest"
      responses:
        "200":
          description: Updated milestone.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
        default:
          $ref: "#/components/responses/Error"
  /api/milestones/{milestoneId}/archive:
    post:
      tags: [Milestones]
      summary: Archive a milestone.
      parameters:
        - $ref: "#/components/parameters/MilestoneId"
      responses:
        "200":
          description: Archived milestone.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
        default:
          $ref: "#/components/responses/Error"
  /api/milestones/{milestoneId}/reactivate:
    post:
      tags: [Milestones]
      summary: Reactivate a milestone.
      parameters:
        - $ref: "#/components/parameters/MilestoneId"
      responses:
        "200":
          description: Reactivated milestone.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/cycles:
    get:
      tags: [Cycles]
      summary: List project cycles.
      description: Lists non-archived project cycles by default. Contributors may read cycles, including cycles for archived projects.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: includeArchived
          in: query
          schema:
            type: boolean
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ProjectCycleStatus"
      responses:
        "200":
          description: Project cycles.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectCycle"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Cycles]
      summary: Create a project cycle.
      description: Owners and maintainers can create cycles for active projects. A project can have one active non-archived cycle, and planned/active cycle windows cannot overlap.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectCycleRequest"
      responses:
        "201":
          description: Created cycle.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectCycle"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/cycles/{cycleId}:
    get:
      tags: [Cycles]
      summary: Get a project cycle.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/CycleId"
      responses:
        "200":
          description: Project cycle.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectCycle"
        default:
          $ref: "#/components/responses/Error"
    patch:
      tags: [Cycles]
      summary: Update a project cycle.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/CycleId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectCycleRequest"
      responses:
        "200":
          description: Updated cycle.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectCycle"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/cycles/{cycleId}/archive:
    post:
      tags: [Cycles]
      summary: Archive a project cycle.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/CycleId"
      responses:
        "200":
          description: Archived cycle.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectCycle"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/cycles/{cycleId}/reactivate:
    post:
      tags: [Cycles]
      summary: Reactivate a project cycle.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/CycleId"
      responses:
        "200":
          description: Reactivated cycle.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectCycle"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/cycles/{cycleId}/closeout-preview:
    get:
      tags: [Cycles]
      summary: Preview cycle closeout.
      description: |
        Owners and maintainers can preview the current active, non-archived cycle scope,
        immutable snapshot counts, unfinished work, and eligible planned destinations.
        Preview is advisory and performs no writes.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/CycleId"
      responses:
        "200":
          description: Current closeout preview.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectCycleCloseoutPreview"
        default:
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/cycles/{cycleId}/closeout:
    post:
      tags: [Cycles]
      summary: Close an active cycle.
      description: |
        Owners and maintainers atomically complete an active, non-archived cycle, preserve
        its immutable closeout snapshot, and move unfinished work to a planned destination
        cycle or to unplanned work when `destinationCycleId` is null. Terminal work remains
        assigned to the completed source cycle. A matching retry returns the original result
        with `applied: false`; a retry naming a different destination returns conflict.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/CycleId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloseProjectCycleRequest"
      responses:
        "200":
          description: Applied closeout or matching idempotent replay.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloseProjectCycleResult"
        default:
          $ref: "#/components/responses/Error"
