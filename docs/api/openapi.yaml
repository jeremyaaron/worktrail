        owner:
          $ref: "#/components/schemas/Member"
        name:
          type: string
        visibility:
          $ref: "#/components/schemas/SavedWorkViewVisibility"
        isPinned:
          type: boolean
          description: Whether the saved view is promoted into the pinned shortcuts area for its workspace or project scope.
        query:
          $ref: "#/components/schemas/WorkItemQuery"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateSavedWorkViewRequest:
      type: object
      required: [name, query]
      properties:
        name:
          type: string
        scope:
          $ref: "#/components/schemas/SavedWorkViewScope"
          default: workspace
          description: Use `project` with `projectId` to save filters for a project board/list context.
        projectId:
          type: string
          format: uuid
          description: Required when `scope` is `project`; not allowed for workspace-scoped saved views.
        visibility:
          $ref: "#/components/schemas/SavedWorkViewVisibility"
