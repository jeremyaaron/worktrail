services:
  postgres:
    image: postgres:16-alpine
    container_name: worktrail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: worktrail
      POSTGRES_USER: worktrail
      POSTGRES_PASSWORD: worktrail
    ports:
      - "5432:5432"
    volumes:
      - worktrail-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worktrail -d worktrail"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  worktrail-postgres-data:
