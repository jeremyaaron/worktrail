<div class="app-shell">
  <header class="topbar">
    <a class="brand" routerLink="/my-work" aria-label="Worktrail my work">
      <span class="brand__mark" aria-hidden="true">W</span>
      <span>Worktrail</span>
    </a>

    <nav class="primary-nav" aria-label="Primary navigation">
      <a routerLink="/my-work" routerLinkActive="primary-nav__link--active">My Work</a>
      <a routerLink="/projects" routerLinkActive="primary-nav__link--active">Projects</a>
      <a routerLink="/work-items" routerLinkActive="primary-nav__link--active">Work Items</a>
      <a routerLink="/workspace/settings" routerLinkActive="primary-nav__link--active">
        Workspace Settings
      </a>
      <a
        class="primary-nav__action"
        routerLink="/work-items/new"
        routerLinkActive="primary-nav__link--active"
      >
        Create
      </a>
    </nav>

    <section class="actor-selector" aria-label="Current user">
      @if (currentUser.isLoading()) {
        <app-loading-indicator label="Loading members" />
      } @else if (currentUser.error()) {
        <app-error-panel
          title="Members unavailable"
          [message]="currentUser.error() ?? ''"
          (retry)="loadMembers()"
        />
      } @else {
        <label for="current-member">Acting as</label>
        @if (currentUser.activeMembers().length > 0) {
          <select
            id="current-member"
            [ngModel]="currentUser.selectedMember()?.id"
            (ngModelChange)="selectMember($event)"
          >
            @for (member of currentUser.activeMembers(); track member.id) {
              <option [value]="member.id">{{ member.name }} · {{ member.role }}</option>
            }
          </select>
        } @else {
          <span class="actor-selector__empty">No active members</span>
        }
      }
    </section>
  </header>

  <main class="content-shell">
    <router-outlet />
  </main>
</div>
