name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://worktrail:worktrail@localhost:5432/worktrail

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: worktrail
          POSTGRES_USER: worktrail
          POSTGRES_PASSWORD: worktrail
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U worktrail -d worktrail"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Prepare database
        run: npm run db:reset && npm run db:migrate && npm run db:seed

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
